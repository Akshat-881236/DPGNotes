<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | DPGNotes</title>
<meta name="description" content="The page you are looking for cannot be found. Return to the DPGNotes homepage.">
<meta name="og:title" content="404 - Page Not Found | DPGNotes">
<meta name="og:description" content="The page you are looking for cannot be found. Return to the DPGNotes homepage.">
<meta name="og:image" content="https://dpgnotes.web.app/Assets/DPGNotes/icon-192.png">
<meta name="og:url" content="https://dpgnotes.web.app/404.html">
<link rel="canonical" href="https://dpgnotes.web.app/404.html">
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="icon" type="image/png" href="https://akshat-881236.github.io/TrackerJS/Assets/AKNH/icon-192.png">
<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: #fff;
}

/* BACKGROUND ANIMATION */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* FLOATING PARTICLES */
.particles span {
  position: absolute;
  display: block;
  width: 5px;
  height: 5px;
  background: #ff4081;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh) scale(0);
  }
  100% {
    transform: translateY(-10vh) scale(1);
  }
}

/* GLASS CARD */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 50px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
  animation: fadeIn 1.5s ease;
}

/* TEXT */
h1 {
  font-size: 80px;
  margin-bottom: 10px;
  letter-spacing: 3px;
}

p {
  font-size: 18px;
  margin-bottom: 25px;
  opacity: 0.8;
}

/* ICON */
.icon {
  font-size: 60px;
  color: #ff4081;
  margin-bottom: 15px;
  animation: bounce 2s infinite;
}

/* BUTTON */
.btn-home {
  display: inline-block;
  padding: 12px 25px;
  background: linear-gradient(45deg, #ff4081, #e040fb);
  border-radius: 30px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
  font-weight: 600;
}

.btn-home:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #ff4081;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* MOBILE */
@media(max-width:600px){
  h1 { font-size: 50px; }
  .card { padding: 30px; }
}

</style>
<script src="https://akshat-881236.github.io/TrackerJS/redirect.js"></script>
</head>
<body>

<!-- PARTICLES -->
<div class="particles">
  <span style="left:10%; animation-delay:0s;"></span>
  <span style="left:20%; animation-delay:2s;"></span>
  <span style="left:30%; animation-delay:4s;"></span>
  <span style="left:50%; animation-delay:1s;"></span>
  <span style="left:70%; animation-delay:3s;"></span>
  <span style="left:90%; animation-delay:5s;"></span>
</div>

<!-- CARD -->
<div class="card">

  <div class="icon">
    <i class="bi bi-exclamation-triangle-fill"></i>
  </div>

  <h1>404 - Page Not Found</h1>
  <h3>DPGNotes</h3>
  <p>Oops! The page you're looking for doesn’t exist or was moved.</p>

  <a href="index.html" class="btn-home">
    <i class="bi bi-house-door-fill"></i> Back to Home
  </a>

</div>
<script>
const previousPage = document.referrer || 'Direct Access';
window.onload = function() {
  history.replaceState(null, null, 'https://dpgnotes.web.app/404.html');
};
// Auto redirect to previous page after 10 seconds or if no previous page, redirect to homepage
setTimeout(() => {
  if (previousPage !== 'Direct Access') {
    window.location.href = previousPage;
  } else {
    window.location.href = 'index.html';
  }
}, 10000);
</script>
</body>
</html>
