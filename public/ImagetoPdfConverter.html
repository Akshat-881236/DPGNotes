            right: 0;

    <!-- Main Application Script -->
    <script>
        // ============================================
        // ANH ADVANCED IMAGE TO PDF CONVERTER
        // Production-Ready Single File Application
        // FIXED: Base64 Image Handling
        // ============================================

        // Global State Management
        const state = {
            metadata: {
                paperID: '',
                paperName: '',
                subjectName: '',
                subjectCode: '',
                copyrightValue: '',
                referenceLink: '',
                anhSiteUrl: 'https://akshat-881236.github.io/',
                anhLogo: null
            },
            pages: [],
            currentPDFDoc: null,
            currentScale: 1,
            generatedPDF: null,
            totalPages: 0,
            trackingID: generateUUID()
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================

        /**
         * Generate UUID for PDF tracking
         */
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        /**
         * Get current ISO timestamp
         */
        function getCurrentTimestamp() {
            return new Date().toISOString();
        }

        /**
         * Get current date-time string for filename
         */
        function getDateTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}${month}${day}_${hours}${minutes}${seconds}`;
        }

        /**
         * Show message to user
         */
        function showMessage(message, type = 'info') {
            const container = document.getElementById('messagesContainer');
            const msgElement = document.createElement('div');
            msgElement.className = `message ${type}`;
            
            const iconMap = {
                success: '✓',
                error: '✕',
                info: 'ℹ'
            };
            
            msgElement.innerHTML = `<span>${iconMap[type]}</span><span>${message}</span>`;
            container.appendChild(msgElement);
            
            setTimeout(() => msgElement.remove(), 5000);
        }

        /**
         * Validate metadata form
         */
        function validateMetadata() {
            const required = ['paperID', 'paperName', 'subjectName', 'subjectCode', 'copyrightValue', 'referenceLink'];
            
            for (const field of required) {
                const value = document.getElementById(field).value.trim();
                if (!value) {
                    showMessage(`${field} is required`, 'error');
                    return false;
                }
            }
            
            return true;
        }

        /**
         * Update metadata from form
         */
        function updateMetadata() {
            state.metadata.paperID = document.getElementById('paperID').value.trim();
            state.metadata.paperName = document.getElementById('paperName').value.trim();
            state.metadata.subjectName = document.getElementById('subjectName').value.trim();
            state.metadata.subjectCode = document.getElementById('subjectCode').value.trim();
            state.metadata.copyrightValue = document.getElementById('copyrightValue').value.trim();
            state.metadata.referenceLink = document.getElementById('referenceLink').value.trim();
            state.metadata.anhSiteUrl = document.getElementById('anhSiteUrl').value.trim();
        }

        /**
         * Convert base64 data URL to Uint8Array
         * FIXED: Properly handle base64 images without fetch()
         */
        function base64ToUint8Array(base64String) {
            try {
                // Extract base64 part from data URL
                const base64 = base64String.split(',')[1] || base64String;
                
                // Decode base64 to binary string
                const binaryString = atob(base64);
                
                // Convert binary string to Uint8Array
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                return bytes;
            } catch (error) {
                console.error('Error converting base64:', error);
                throw new Error('Failed to process image data');
            }
        }

        /**
         * Detect image type from base64
         */
        function detectImageType(base64String) {
            if (base64String.includes('image/jpeg') || base64String.includes('image/jpg')) {
                return 'jpg';
            } else if (base64String.includes('image/png')) {
                return 'png';
            }
            return 'jpg'; // Default
        }

        /**
         * Detect image orientation
         */
        function detectImageOrientation(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        if (img.width > img.height) {
                            resolve('landscape');
                        } else {
                            resolve('portrait');
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        /**
         * Compress image for better performance
         */
        function compressImage(canvas, maxWidth = 1920, quality = 0.8) {
            if (canvas.width > maxWidth) {
                const ratio = maxWidth / canvas.width;
                const ctx = canvas.getContext('2d');
                const newCanvas = document.createElement('canvas');
                newCanvas.width = maxWidth;
                newCanvas.height = canvas.height * ratio;
                const newCtx = newCanvas.getContext('2d');
                newCtx.drawImage(canvas, 0, 0, newCanvas.width, newCanvas.height);
                return newCanvas.toDataURL('image/jpeg', quality);
            }
            return canvas.toDataURL('image/jpeg', quality);
        }

        // ============================================
        // PAGE MANAGEMENT
        // ============================================

        /**
         * Generate page upload cards
         */
        function generatePages() {
            const totalPages = parseInt(document.getElementById('totalPages').value);
            
            if (!totalPages || totalPages < 1 || totalPages > 500) {
                showMessage('Please enter a valid number of pages (1-500)', 'error');
                return;
            }

            state.totalPages = totalPages;
            state.pages = new Array(totalPages).fill(null);

            const grid = document.getElementById('pagesGrid');
            grid.innerHTML = '';

            for (let i = 0; i < totalPages; i++) {
                const card = document.createElement('div');
                card.className = 'page-upload-card';
                card.innerHTML = `
                    <div class="page-number">${i + 1}</div>
                    <img class="page-preview" id="preview-${i}" src="" alt="Page ${i + 1}" style="display: none;">
                    <input type="file" id="input-${i}" accept="image/*" style="display: none;">
                    <div class="page-status" id="status-${i}">Click to upload</div>
                `;
                
                card.addEventListener('click', () => document.getElementById(`input-${i}`).click());
                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    card.style.borderColor = 'var(--accent-primary)';
                });
                card.addEventListener('dragleave', () => {
                    card.style.borderColor = '';
                });
                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    card.style.borderColor = '';
                    if (e.dataTransfer.files.length > 0) {
                        document.getElementById(`input-${i}`).files = e.dataTransfer.files;
                        handlePageUpload(i);
                    }
                });

                const input = card.querySelector(`#input-${i}`);
                input.addEventListener('change', () => handlePageUpload(i));

                grid.appendChild(card);
            }

            showMessage(`Generated ${totalPages} page upload cards`, 'info');
        }

        /**
         * Handle individual page upload
         */
        function handlePageUpload(pageIndex) {
            const input = document.getElementById(`input-${pageIndex}`);
            const file = input.files[0];

            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showMessage('Please upload an image file', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const compressedData = compressImage(canvas);
                    state.pages[pageIndex] = compressedData;

                    // Update UI
                    const preview = document.getElementById(`preview-${pageIndex}`);
                    preview.src = compressedData;
                    preview.style.display = 'block';

                    const card = preview.closest('.page-upload-card');
                    card.classList.add('filled');

                    const status = document.getElementById(`status-${pageIndex}`);
                    status.textContent = '✓ Ready';
                    status.classList.add('ready');

                    // Enable PDF generation if all pages are filled
                    checkAllPagesReady();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        /**
         * Check if all pages are ready
         */
        function checkAllPagesReady() {
            const allReady = state.pages.every(page => page !== null);
            document.getElementById('generatePdfBtn').disabled = !allReady || state.totalPages === 0;
        }

        // ============================================
        // PDF GENERATION
        // ============================================

        /**
         * Main PDF generation function
         */
        async function generatePDF() {
            if (!validateMetadata()) return;
            if (state.pages.some(page => page === null)) {
                showMessage('All pages must be uploaded', 'error');
                return;
            }

            updateMetadata();

            const progressContainer = document.getElementById('progressContainer');
            progressContainer.classList.add('active');

            try {
                // Use PDF-LIB for advanced metadata support
                const pdfDoc = await PDFLib.PDFDocument.create();
                pdfDoc.setTitle(state.metadata.paperName);
                pdfDoc.setSubject(state.metadata.subjectName);
                pdfDoc.setKeywords(['Semester Exam', 'ANH', 'Academic Archive']);
                pdfDoc.setAuthor('Akshat Network Hub');
                pdfDoc.setCreator('ANH Advanced Image To PDF Converter');
                pdfDoc.setProducer('Akshat Network Hub PDF Engine');

                // Process each page
                for (let i = 0; i < state.pages.length; i++) {
                    await addPageToPDF(pdfDoc, state.pages[i], i + 1, state.pages.length);
                    updateProgress((i + 1) / state.pages.length * 100);
                }

                // Add QR code on last page
                await addQRCodeToLastPage(pdfDoc);

                // Save PDF
                const pdfBytes = await pdfDoc.save();
                state.generatedPDF = pdfBytes;

                progressContainer.classList.remove('active');
                showMessage('PDF generated successfully!', 'success');
                document.getElementById('downloadBtn').disabled = false;

                // Display preview
                await displayPDFPreview(pdfBytes);

            } catch (error) {
                progressContainer.classList.remove('active');
                showMessage(`Error generating PDF: ${error.message}`, 'error');
                console.error('PDF Generation Error:', error);
            }
        }

        /**
         * Add page to PDF with metadata and watermarks
         * FIXED: Properly handle base64 images
         */
        async function addPageToPDF(pdfDoc, imageData, pageNumber, totalPages) {
            try {
                // Convert base64 to Uint8Array
                const imageBytes = base64ToUint8Array(imageData);
                const imageType = detectImageType(imageData);

                let image;

                if (imageType === 'png') {
                    image = await pdfDoc.embedPng(imageBytes);
                } else {
                    image = await pdfDoc.embedJpg(imageBytes);
                }

                const orientation = document.getElementById('orientation').value;
                let page;
                let pageWidth;
                let pageHeight;

                if (orientation === 'auto') {

                    const imgAspect = image.width / image.height;

                    if (imgAspect > 1) {

                        page = pdfDoc.addPage([842,595]);

                        pageWidth = 842;
                        pageHeight = 595;

                    } else {
                        page = pdfDoc.addPage([595,842]);
                        const { width, height } = page.getSize();
                        pageWidth = width;
                        pageHeight = height;
                    }
                }

                // Draw image to fit page
                const imgAspect = image.width / image.height;
                const pageAspect = pageWidth / pageHeight;
                let drawWidth, drawHeight;

                if (imgAspect > pageAspect) {
                    drawWidth = pageWidth;
                    drawHeight = pageWidth / imgAspect;
                } else {
                    drawHeight = pageHeight;
                    drawWidth = pageHeight * imgAspect;
                }

                const x = (pageWidth - drawWidth) / 2;
                const y = (pageHeight - drawHeight) / 2;

                page.drawImage(image, { x, y, width: drawWidth, height: drawHeight });

                // Add watermark
                addWatermark(page, pageWidth, pageHeight);

                // Add borders with reference link
                addBordersWithLink(page, pageWidth, pageHeight);

                // Add metadata text
                addPageMetadata(page, pageWidth, pageHeight, pageNumber, totalPages);

            } catch (error) {
                console.error(`Error adding page ${pageNumber}:`, error);
                throw new Error(`Failed to process page ${pageNumber}: ${error.message}`);
            }
        }

        /**
         * Add watermark to page
         */
        function addWatermark(page, width, height) {
            const watermarkText = 'AKSHAT NETWORK HUB';
            
            // Draw semi-transparent watermark at 45 degrees
            page.drawText(
            watermarkText,
            {
            rotate: PDFLib.degrees(45),
            color: PDFLib.rgb(
            0.85,
            0.85,
            0.85
            )
            });
        }

        /**
         * Add borders with reference link
         */
        function addBordersWithLink(page, width, height) {
            const link = state.metadata.referenceLink;
            const borderSize = 20;
            const fontSize = 8;
            const textColor = PDFLib.rgb(0.6, 0.6, 0.6);

            // Top border
            const topText = link + ' • ' + link + ' • ' + link;
            page.drawText(topText, {
                x: borderSize,
                y: height - borderSize,
                size: fontSize,
                color: textColor,
                opacity: 0.5
            });

            // Bottom border
            page.drawText(topText, {
                x: borderSize,
                y: borderSize - 5,
                size: fontSize,
                color: textColor,
                opacity: 0.5
            });

            // Left border (rotated)
            page.drawText(link, {
                x: borderSize - 10,
                y: height / 2 - 50,
                size: fontSize,
                color: textColor,
                opacity: 0.5,
                rotate: PDFLib.degrees(90)
            });

            // Right border (rotated)
            page.drawText(link, {
                x: width - borderSize + 5,
                y: height / 2 - 50,
                size: fontSize,
                color: textColor,
                opacity: 0.5,
                rotate: PDFLib.degrees(90)
            });
        }

        /**
         * Add page metadata
         */
        function addPageMetadata(page, width, height, pageNumber, totalPages) {
            const fontSize = 9;
            const textColor = PDFLib.rgb(0.4, 0.4, 0.4);
            const margin = 10;

            // Top left: Copyright
            page.drawText('© Akshat Network Hub', {
                x: margin,
                y: height - margin - 10,
                size: fontSize,
                color: textColor,
                opacity: 0.7
            });

            // Top right: Paper ID
            page.drawText(state.metadata.paperID, {
                x: width - margin - 80,
                y: height - margin - 10,
                size: fontSize,
                color: textColor,
                opacity: 0.7
            });

            // Bottom left: Reference Link
            page.drawText(state.metadata.referenceLink.substring(0, 40), {
                x: margin,
                y: margin,
                size: fontSize,
                color: textColor,
                opacity: 0.7
            });

            // Bottom right: Page number
            page.drawText(`Page ${pageNumber} of ${totalPages}`, {
                x: width - margin - 60,
                y: margin,
                size: fontSize,
                color: textColor,
                opacity: 0.7
            });
        }

        /**
         * Add QR code to last page
         */
        async function addQRCodeToLastPage(pdfDoc) {
            const pages = pdfDoc.getPages();
            const lastPage =
            pdfDoc.getPage(
            pdfDoc.getPageCount() - 1
            );
            const { width, height } = lastPage.getSize();

            // Generate QR code data
            const qrData = JSON.stringify({
                PaperID: state.metadata.paperID,
                SubjectCode: state.metadata.subjectCode,
                PaperName: state.metadata.paperName,
                GeneratedTimestamp: getCurrentTimestamp(),
                ReferenceLink: state.metadata.referenceLink,
                TrackingID: state.trackingID
            });

            // Create QR code canvas
            const qrContainer = document.createElement('div');
            qrContainer.style.position = 'absolute';
            qrContainer.style.left = '-9999px';
            document.body.appendChild(qrContainer);

            const qr = new QRCode(qrContainer, {
                text: qrData,
                width: 200,
                height: 200,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            await new Promise(resolve => setTimeout(resolve, 500));
            const qrCanvas = qrContainer.querySelector('canvas');
            const qrDataUrl = qrCanvas.toDataURL('image/png');
            const qrBytes = base64ToUint8Array(qrDataUrl);
            const qrImage = await pdfDoc.embedPng(qrBytes);

            // Draw QR code on last page
            lastPage.drawImage(qrImage, {
                x: width - 120,
                y: 30,
                width: 100,
                height: 100
            });

            // Label
            lastPage.drawText('Scan QR', {
                x: width - 120,
                y: 20,
                size: 8,
                color: PDFLib.rgb(0.4, 0.4, 0.4)
            });

            document.body.removeChild(qrContainer);
        }

        /**
         * Update progress bar
         */
        function updateProgress(percent) {
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            progressFill.style.width = percent + '%';
            progressPercent.textContent = Math.round(percent) + '%';
        }

        // ============================================
        // PDF PREVIEW
        // ============================================

        /**
         * Display PDF preview
         */
        async function displayPDFPreview(pdfBytes) {
            const blobUrl = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
            
            // Set up PDF.js worker
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

            const pdf = await pdfjsLib.getDocument(blobUrl).promise;
            state.currentPDFDoc = pdf;

            // Display first page
            displayPDFPage(1);
        }

        /**
         * Display specific PDF page
         */
        async function displayPDFPage(pageNum) {
            const pdf = state.currentPDFDoc;
            if (!pdf || pageNum < 1 || pageNum > pdf.numPages) return;

            try {
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: state.currentScale });

                const canvas = document.getElementById('pdfCanvas') || document.createElement('canvas');
                canvas.id = 'pdfCanvas';
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const context = canvas.getContext('2d');
                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

                const viewer = document.getElementById('pdfViewer');
                viewer.innerHTML = '';
                viewer.appendChild(canvas);

                document.getElementById('previewPageInfo').textContent = 
                    `Page ${pageNum} of ${pdf.numPages}`;

            } catch (error) {
                console.error('Error displaying PDF page:', error);
            }
        }

        /**
         * Zoom PDF
         */
        function zoomPDF(factor) {
            if (!state.currentPDFDoc) return;
            state.currentScale *= factor;
            state.currentScale = Math.max(0.5, Math.min(3, state.currentScale));
            displayPDFPage(parseInt(document.getElementById('previewPageInfo').textContent.split(' ')[1]) || 1);
        }

        /**
         * Reset zoom
         */
        function resetZoom() {
            state.currentScale = 1;
            if (state.currentPDFDoc) {
                displayPDFPage(1);
            }
        }

        // ============================================
        // PDF DOWNLOAD
        // ============================================

        /**
         * Download generated PDF
         */
        function downloadPDF() {
            if (!state.generatedPDF) {
                showMessage('No PDF to download', 'error');
                return;
            }

            const filename = `${state.metadata.paperID}_${state.metadata.subjectCode}_${getDateTimeString()}.pdf`;
            const blob = new Blob([state.generatedPDF], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            showMessage(`PDF downloaded as ${filename}`, 'success');
        }

        // ============================================
        // MODAL MANAGEMENT
        // ============================================

        /**
         * Close page modal
         */
        function closePageModal() {
            document.getElementById('pageModal').classList.remove('active');
        }

        // ============================================
        // INITIALIZATION
        // ============================================

        document.addEventListener('DOMContentLoaded', () => {
            showMessage('ANH PDF Converter ready. All processing is offline and local.', 'info');
        });

        // Prevent accidental navigation
        window.addEventListener('beforeunload', (e) => {
            if (state.generatedPDF) {
                e.preventDefault();
                e.returnValue = 'You have an unsaved PDF. Are you sure you want to leave?';
            }
        });
    </script>
