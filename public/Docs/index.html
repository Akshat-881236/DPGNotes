<!-- =====================================
     HEADER
===================================== -->

<header class="header">

  <div class="header-inner">

    <div class="logo">

      🚀 DPGNotes Documentation

    </div>

<!-- =====================================

<main class="main">

        README.md Renderer

      </h2>

      <span id="status">

        Initializing...

      </span>

    </div>

    <div
      id="docContent"
      class="doc-content"

        Loading README.md...

      </div>

    </div>

  </div>

</main>

<!-- =====================================
     FOOTER
===================================== -->

<footer class="footer">

  DPGNotes • Smart Documentation Engine

</footer>

<script>

/* =========================================
   ABSOLUTE README PATH
========================================= */

/*
IMPORTANT:

Move README.md inside:

public/

Final Structure:

public/
 ├── Documentation.htm
 ├── README.md
 ├── index.html

*/

const README_PATH =

"./docs.md";

/* =========================================
   MARKED CONFIG
========================================= */

if(window.marked){

  marked.setOptions({

    breaks:true,

    gfm:true
  });
}

/* =========================================
   CUSTOM FALLBACK ENGINE
========================================= */

function fallbackMarkdown(md){

  md = md.replace(
    /^# (.*$)/gim,
    "<h1>$1</h1>"
  );

  md = md.replace(
    /^## (.*$)/gim,
    "<h2>$1</h2>"
  );

  md = md.replace(
    /^### (.*$)/gim,
    "<h3>$1</h3>"
  );

  md = md.replace(
    /^#### (.*$)/gim,
    "<h4>$1</h4>"
  );

  md = md.replace(
    /\*\*(.*?)\*\*/gim,
    "<strong>$1</strong>"
  );

  md = md.replace(
    /\[(.*?)\]\((.*?)\)/gim,
    '<a href="$2" target="_blank">$1</a>'
  );

  md = md.replace(
    /`(.*?)`/gim,
    "<code>$1</code>"
  );

  md = md.replace(
    /^\- (.*$)/gim,
    "<li>$1</li>"
  );

  md = md.replace(
    /\n/g,
    "<br>"
  );

  return md;
}

/* =========================================
   LOAD README
========================================= */

async function loadREADME(){

  try{

    document.getElementById(
      "status"
    ).textContent =

    "Fetching README...";

    const response =

    await fetch(
      README_PATH,
      {
        cache:"no-cache"
      }
    );

    if(!response.ok){

      throw new Error(
        "README.md not found"
      );
    }

    const markdown =

    await response.text();

    let html = "";

    /* PRIMARY ENGINE */

    if(window.marked){

      html = marked.parse(
        markdown
      );

    }else{

      console.warn(
        "Marked.js failed. Using fallback engine."
      );

      html = fallbackMarkdown(
        markdown
      );
    }

    document.getElementById(
      "docContent"
    ).innerHTML =

    `
    <div class="markdown">

${html}

    </div>
    `;

    document.getElementById(
      "status"
    ).textContent =

    "README Loaded";

    /* HIGHLIGHT */

    if(window.hljs){

      hljs.highlightAll();

    }else{

      console.warn(
        "Highlight.js not loaded"
      );
    }

  }catch(error){

    console.error(error);

    document.getElementById(
      "docContent"
    ).innerHTML =

    `
    <div class="error-box">

      <h2>

        README Load Failed

      </h2>

      <br>

      Possible reasons:

      <ul>

        <li>
          README.md not inside public folder
        </li>

        <li>
          Wrong README path
        </li>

        <li>
          Firebase Hosting cache issue
        </li>

        <li>
          CDN blocked
        </li>

      </ul>

    </div>
    `;

    document.getElementById(
      "status"
    ).textContent =

    "Load Failed";
  }
}

/* =========================================
   INIT
========================================= */

window.addEventListener(

  "DOMContentLoaded",

  ()=>{

    loadREADME();
  }
);

</script>
